<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#9de6ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Sight Word Pop" />
    <title>Sight Word Pop</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-labelledby="game-title">
      <section id="start-screen" class="screen screen--start">
        <div class="card">
          <p class="eyebrow">Sight Word Pop</p>
          <h1 id="game-title">Tap the word you hear.</h1>
          <p class="intro">
            Balloons will float around the sky. Press start, listen for the word,
            then pop the matching balloon.
          </p>
          <button id="start-button" class="start-button" type="button">Start</button>
        </div>
      </section>

      <section id="play-screen" class="screen screen--play is-hidden" aria-live="polite">
        <div class="hud">
          <div>
            <p class="hud-label">Listen for</p>
            <p id="current-word" class="current-word">Ready?</p>
          </div>
          <button id="repeat-button" class="repeat-button" type="button">Say it again</button>
        </div>
        <div id="balloon-field" class="balloon-field" aria-label="Sight word balloons"></div>
      </section>

      <section id="finish-screen" class="screen screen--finish is-hidden">
        <div class="card">
          <p class="eyebrow">Great job!</p>
          <h2>Congratulations!</h2>
          <p>You popped every sight word balloon.</p>
          <button id="play-again-button" class="start-button" type="button">Play again</button>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
